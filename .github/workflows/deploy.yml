name: CI/CD to Hetzner

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm ts:ci

  deploy-staging:
    name: Deploy to Staging
    needs: type-check
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Debug Secrets
        run: |
          echo "Host is set: ${{ secrets.HETZNER_STAGING_HOST != '' }}"
          echo "User is set: ${{ secrets.HETZNER_STAGING_USER != '' }}"
          echo "Key is set: ${{ secrets.HETZNER_STAGING_SSH_KEY != '' }}"
      
      - name: Deploy Staging via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_STAGING_HOST }}
          username: ${{ secrets.HETZNER_STAGING_USER }}
          key: ${{ secrets.HETZNER_STAGING_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/heinapp/heinapp-frontend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            
            # Copy .env.staging as .env.local so Next.js inlines NEXT_PUBLIC_* vars at build time
            cp .env.staging .env.local
            
            # Build Docker image
            docker build --network=host -t heinapp-frontend-service-staging .
            
            # Clean up temporary .env.local
            rm -f .env.local
            
            # Stop and remove old container
            docker rm -f heinapp-frontend-staging || true
            
            # Run new container with .env.staging
            docker run -d \
              --name heinapp-frontend-staging \
              --env-file .env.staging \
              -p 8082:8080 \
              --restart unless-stopped \
              heinapp-frontend-service-staging
            
            # Wait for container to be ready and verify
            sleep 5
            if ! docker ps | grep -q heinapp-frontend-staging; then
              echo "❌ Container failed to start!"
              docker logs heinapp-frontend-staging
              exit 1
            fi
            
            # Deploy combined Caddy configuration (Frontend + Backend)
            cd /root/heinapp/heinapp-frontend-service
            ./deployment/deploy-caddy.sh staging
            
            echo "✅ Staging deployment complete!"
            echo "🌐 Frontend: https://staging.heina.org"
            echo "🌐 Backend:  https://api.staging.heina.org"

  deploy-production:
    name: Deploy to Production
    needs: type-check
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc.')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Debug Secrets
        run: |
          echo "Host is set: ${{ secrets.HETZNER_HOST != '' }}"
          echo "User is set: ${{ secrets.HETZNER_USER != '' }}"
          echo "Key is set: ${{ secrets.HETZNER_SSH_KEY != '' }}"
      
      - name: Deploy Production via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAG_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAG_NAME
          script: |
            set -e
            cd /root/heinapp/heinapp-frontend-service
            git fetch --all --tags
            git checkout "$TAG_NAME"
            
            # Copy .env as .env.local so Next.js inlines NEXT_PUBLIC_* vars at build time
            cp .env .env.local
            
            # Build Docker image
            docker build --network=host -t heinapp-frontend-service .
            
            # Clean up temporary .env.local
            rm -f .env.local
            
            # Stop and remove old container
            docker rm -f heinapp-frontend || true
            
            # Run new container with .env
            docker run -d \
              --name heinapp-frontend \
              --env-file .env \
              -p 8080:8080 \
              --restart unless-stopped \
              heinapp-frontend-service
            
            # Wait for container to be ready and verify
            sleep 5
            if ! docker ps | grep -q heinapp-frontend; then
              echo "❌ Container failed to start!"
              docker logs heinapp-frontend
              exit 1
            fi
            
            # Deploy combined Caddy configuration (Frontend + Backend)
            cd /root/heinapp/heinapp-frontend-service
            ./deployment/deploy-caddy.sh production
            
            echo "✅ Production deployment complete!"
            echo "🌐 Frontend: https://your-domain.com"
            echo "🌐 Backend:  https://api.your-domain.com"